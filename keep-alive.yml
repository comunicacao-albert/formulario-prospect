name: Keep Supabase Alive

# Faz um ping periódico na Edge Function (que consulta o banco) para evitar
# que o projeto Supabase seja pausado automaticamente por inatividade
# (planos gratuitos pausam após ~7 dias sem uso).

on:
  schedule:
    - cron: '0 12 * * *'   # todo dia às 12:00 UTC (09:00 horário de Brasília)
  workflow_dispatch:        # permite rodar manualmente pela aba Actions

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Edge Function
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" https://rbbnnumspxcyihbytxdd.supabase.co/functions/v1/submit-lead)
          echo "Resposta do ping: $response"
          if [ "$response" -ne 200 ]; then
            echo "Ping retornou status inesperado: $response"
            exit 1
          fi
